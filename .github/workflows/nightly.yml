name: Nightly live-site check

# Smoke-tests the DEPLOYED site (sayitdefi.com) every night: catches bad
# Pages deploys, CDN/SRI breakage, or explorer-API regressions before
# users report them. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: '23 6 * * *'
  workflow_dispatch:

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Smoke the live site
        env:
          SAYIT_URL: https://sayitdefi.com
        run: python3 .ci/smoke.py /tmp/live-smoke.png

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-screenshot
          path: /tmp/live-smoke.png
          if-no-files-found: ignore
