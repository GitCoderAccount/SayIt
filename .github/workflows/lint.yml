name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: SW_CACHE_VER content-hash guard
        # SW_CACHE_VER must equal a content hash of the app-asset shell so a
        # returning visitor's service worker rebuilds its cache whenever any
        # asset changes. It is derived automatically (.ci/derive-sw-ver.js +
        # the pre-commit hook in .ci/hooks); this verifies it wasn't left stale.
        # No git history needed — it checks the current tree.
        run: node .ci/derive-sw-ver.js --check

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Extract inline scripts
        run: node .ci/extract-inline-script.js index.html .ci/app.extracted.js

      - name: Syntax check (node --check)
        run: |
          node --check .ci/app.extracted.js
          node --check .ci/head.extracted.js
          node --check sw.js

      - name: ESLint (catches undefined references, etc.)
        # --no-ignore is load-bearing: ESLint 8 silently skips files inside
        # dot-directories (like .ci/) by default — without it this step
        # passes without linting the app code at all.
        run: >
          npx --yes eslint@8.57.1
          --no-eslintrc --no-ignore --config .ci/eslintrc.json
          .ci/app.extracted.js .ci/head.extracted.js sw.js

      - name: Protocol unit tests
        run: node --test .ci/test/*.test.js

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Boot smoke test
        run: python3 .ci/smoke.py /tmp/smoke.png

      - name: Upload screenshot
        # Always — a per-run gallery of the booted app gives a free visual
        # before/after for every PR, not just failure forensics.
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: smoke-screenshot
          path: /tmp/smoke.png
          if-no-files-found: ignore
