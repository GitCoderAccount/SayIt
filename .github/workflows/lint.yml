name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: SW_CACHE_VER bump guard
        # Changed app assets without a version bump mean every returning
        # visitor's service worker keeps serving the previous build.
        # SW_CACHE_VER lives in app.js (it was in index.html before the
        # app.js split — the fallback grep covers historical commits).
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qE '^(index.html|app.js|core.js|cache.js|settings.js|profile.js|polls.js|notes.js|spaces.js|explore.js|lists.js|notifications.js|channels.js|threads.js|bookmarks.js|banner.js|embeds.js|dm.js|boot.js|sayit-crypto.js)$'; then
            OLD=$( (git show HEAD^:app.js 2>/dev/null || git show HEAD^:index.html) | grep -o "SW_CACHE_VER = '[^']*'" | head -1 || true)
            NEW=$(grep -o "SW_CACHE_VER = '[^']*'" app.js | head -1)
            if [ "$OLD" = "$NEW" ]; then
              echo "::error::an app asset changed but SW_CACHE_VER (in app.js) was not bumped"
              exit 1
            fi
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Extract inline scripts
        run: node .ci/extract-inline-script.js index.html .ci/app.extracted.js

      - name: Syntax check (node --check)
        run: |
          node --check .ci/app.extracted.js
          node --check .ci/head.extracted.js
          node --check sw.js

      - name: ESLint (catches undefined references, etc.)
        # --no-ignore is load-bearing: ESLint 8 silently skips files inside
        # dot-directories (like .ci/) by default — without it this step
        # passes without linting the app code at all.
        run: >
          npx --yes eslint@8.57.1
          --no-eslintrc --no-ignore --config .ci/eslintrc.json
          .ci/app.extracted.js .ci/head.extracted.js sw.js

      - name: Protocol unit tests
        run: node --test .ci/test/*.test.js

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Boot smoke test
        run: python3 .ci/smoke.py /tmp/smoke.png

      - name: Upload screenshot
        # Always — a per-run gallery of the booted app gives a free visual
        # before/after for every PR, not just failure forensics.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshot
          path: /tmp/smoke.png
          if-no-files-found: ignore
